<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Booking Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4">Vehicle Booking Form</h1>

        <form class="mx-auto bg-white p-4 border rounded shadow-sm" style="max-width: 500px;">
            <fieldset>
                <legend class="fs-5 fw-bold border-bottom pb-2 mb-3">Vehicle booking information</legend>

                <div class="mb-3">
                    <label class="form-label">Enter your full name</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Enter your phone number</label>
                    <input type="tel" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Enter your email</label>
                    <input type="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Select vehicle type</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="vehicle" id="car">
                        <label class="form-check-label" for="car">Car</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="vehicle" id="van">
                        <label class="form-check-label" for="van">Van</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="vehicle" id="suv">
                        <label class="form-check-label" for="suv">SUV</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pick-up date</label>
                    <input type="date" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Return date</label>
                    <input type="date" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Pick-up time</label>
                    <input type="time" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Number of passengers</label>
                    <input type="number" min="1" max="15" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Additional notes / pick-up address</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>

                <input type="submit" value="Submit" class="btn btn-primary">
            </fieldset>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
